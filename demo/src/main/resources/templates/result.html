<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Spielplan</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            color: white;

            background-image: url("https://tennis-uni.com/wp-content/uploads/tennisplatz-sand.jpeg");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .container {
            max-width: 900px;
            margin: auto;
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
        }

        .round-title {
            background: #111;
            color: white;
            padding: 12px;
            border-radius: 12px;
            margin-top: 25px;
            font-weight: bold;
            text-align: center;
        }

        .match-card {
            background: white;
            color: black;
            margin: 10px 0;
            padding: 15px;
            border-radius: 14px;
            box-shadow: 0 6px 15px rgba(0,0,0,0.25);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .team {
            width: 40%;
            text-align: center;
            font-weight: bold;
        }

        .vs {
            width: 20%;
            text-align: center;
            color: gray;
        }

        .btn {
            display: block;
            margin: 30px auto 0;
            width: fit-content;
            padding: 12px 20px;
            background: #4CAF50;
            color: white;
            text-decoration: none;
            border-radius: 10px;
        }

        .btn:hover {
            background: #45a049;
        }
    </style>
</head>

<body>

<div class="container">

    <h2>Spielplan</h2>

    <th:block th:each="e : ${ergebnisse}">

        <!-- RUNDEN TITEL -->
        <div th:if="${e[0] == 'ROUND'}" class="round-title">
            <span th:text="${e[1]}"></span>
        </div>

        <!-- MATCH -->
        <div th:if="${e[0] != 'ROUND'}" class="match-card">

            <div class="team" th:text="${e[1]}"></div>

            <div class="vs">VS</div>

            <div class="team" th:text="${e[2]}"></div>

        </div>

    </th:block>

    <a class="btn" href="/">⬅ Neues Turnier</a>

</div>
<div style="
    text-align: center;
    margin-top: 30px;
    font-size: 12px;
    color: rgba(255,255,255,0.7);
">
    Philipp Heins
</div>
</body>
</html>
